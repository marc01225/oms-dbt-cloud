sources:
  - name: data_lake
    database: SLEEKMART_OMS
    schema: L1_LANDING

    tables:
      - name: product_catalog_ext
        description: "External table for static product catalog reference data"
        identifier: PRODUCT_CATALOG_EXT

        columns:
          - name: product_id
            description: "Unique product identifier"
            data_type: STRING

          - name: product_name
            description: "Product name"
            data_type: STRING

          - name: category_id
            description: "Reference ID of product category"
            data_type: STRING

          - name: category_name
            description: "Category name"
            data_type: STRING

          - name: subcategory_id
            description: "Reference ID of product subcategory"
            data_type: STRING

          - name: subcategory_name
            description: "Subcategory name"
            data_type: STRING
